name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install core dependencies (no heavy ML)
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" --only-binary llvmlite,numba

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ scripts/ --ignore E501,E402

      - name: Type check with mypy (non-blocking)
        run: |
          pip install mypy pandas-stubs
          mypy src/beacon_io/ --ignore-missing-imports || true

      - name: Run unit tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short --cov=src/beacon_io --cov-report=xml \
            --ignore=tests/test_mcmc.py  # skip slow MCMC tests in CI
        if: hashFiles('tests/') != ''

  check-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e "." --only-binary llvmlite,numba
      - name: Check all modules import cleanly
        run: |
          python -c "import beacon_io; print('beacon_io OK')"
          python -c "from beacon_io.engine import beacon_fast, run_beacon_lineage; print('engine OK')"
          python -c "from beacon_io.config import CFG; print('config OK')"
          python -c "from beacon_io.utils import fdr_correction; print('utils OK')"
