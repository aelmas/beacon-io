# -- Single-cell RNA-seq atlases (public) -------------------------------------
singlecell:
  - name: "Jerby-Arnon_2018_melanoma_ICB"
    source: "GEO:GSE115978"
    cancer: "SKCM"
    description: "scRNA-seq of melanoma tumors pre/post ICB (31 tumors, ~7000 cells)"

  - name: "Sade-Feldman_2018_melanoma_ICB"
    source: "GEO:GSE120575"
    cancer: "SKCM"
    description: "scRNA-seq of TILs from melanoma patients on ICB (48 samples, ~16000 cells)"

  - name: "Zhang_2021_panCancer_TME"
    source: "zenodo:10.5281/zenodo.5461803"
    cancer: "pan-cancer"
    description: "Pan-cancer T cell atlas, 316 patients, 21 cancer types, ~400K cells"

  - name: "Wu_2021_breast_ICB"
    source: "GEO:GSE176078"
    cancer: "BRCA"
    description: "scRNA-seq of breast cancer TME, 26 patients"

# -- BEACON parameters -------------------------------------------------------
beacon:
  # MCMC settings (2 chains x 1000 draws is well-powered for rho with ESS >1500)
  n_chains: 2
  n_draws: 1000
  n_tune: 500
  target_accept: 0.90
  # Significance thresholds
  rho_threshold: -0.25          # posterior median rho cutoff
  rope_width: 0.1               # region of practical equivalence for H0: rho=0
  hdi_prob: 0.95                # highest-density interval probability
  fdr_threshold: 0.05
  # Minimum cell lines per lineage
  min_cell_lines: 7

# -- Immune module parameters ------------------------------------------------
immune:
  deconvolution_method: "CIBERSORTx"   # also supports MCPcounter, EPIC, xCell
  immune_evasion_genesets:
    - "HALLMARK_INTERFERON_GAMMA_RESPONSE"
    - "HALLMARK_INFLAMMATORY_RESPONSE"
    - "HALLMARK_IL6_JAK_STAT3_SIGNALING"
    - "HALLMARK_COMPLEMENT"
    - "KEGG_ANTIGEN_PROCESSING_AND_PRESENTATION"
    - "GO_T_CELL_ACTIVATION"
    - "GO_RESPONSE_TO_TYPE_I_INTERFERON"
    - "REACTOME_PD1_SIGNALING"
    - "REACTOME_MHC_CLASS_I_ANTIGEN_PROCESSING"
  tide_url: "http://tide.dfci.harvard.edu"

# -- Combination discovery parameters ----------------------------------------
combination:
  prism_ic50_threshold: -1.0     # log2 fold-change threshold for sensitivity
  synergy_methods: ["bliss", "hsa"]
  min_drug_targets_overlap: 2
  druggability_sources:
    - "DGIdb"
    - "DrugBank"
    - "ChEMBL"
    - "OpenTargets"

# -- Clinical validation parameters ------------------------------------------
clinical:
  survival_method: "cox_ph"      # cox_ph or kaplan_meier
  response_categories:
    responder: ["CR", "PR"]
    non_responder: ["SD", "PD"]
  biomarker_comparison:          # compare BEACON-IO against existing biomarkers
    - "TMB"
    - "PD-L1 (CPS)"
    - "GEP (Ayers 2017)"
    - "TIDE"
    - "IMPRES"
  cross_validation_folds: 5
  bootstrap_iterations: 1000
