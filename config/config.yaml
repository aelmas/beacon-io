# =============================================================================
# BEACON-IO configuration
# =============================================================================

# -- Paths -------------------------------------------------------------------
output_dir: analysis/out
data_dir: data/raw
processed_dir: data/processed
reference_dir: reference

# -- DepMap data (https://depmap.org/portal/) ---------------------------------
depmap:
  release: "24Q4"                          # DepMap quarterly release
  crispr_file: "CRISPRGeneEffect.csv"      # Chronos-corrected dependency scores
  expression_file: "OmicsExpressionProteinCodingGenesTPMLogp1.csv"
  proteomics_file: "OmicsProteomicsMatrixNormalized.csv"  # gygi lab MS data
  cell_line_info: "Model.csv"
  copy_number_file: "OmicsCNGene.csv"
  mutation_file: "OmicsSomaticMutations.csv"

# -- PRISM drug sensitivity (https://depmap.org/repurposing/) -----------------
prism:
  sensitivity_file: "PRISM_Repurposing_Secondary_Logfold_Change.csv"
  drug_info_file: "PRISM_Repurposing_Drug_Info.csv"
  treatment_info: "PRISM_Repurposing_Secondary_Treatment_Info.csv"

# -- TCGA (via UCSC Xena hubs) ------------------------------------------------
tcga:
  # Expression from toil hub (TCGA + GTEx reprocessed)
  expression_url: "https://toil-xena-hub.s3.us-east-1.amazonaws.com/download/tcga_RSEM_gene_tpm.gz"
  expression_file: "tcga_RSEM_gene_tpm.gz"
  # Clinical phenotype from GDC hub
  clinical_url: "https://gdc-hub.s3.us-east-1.amazonaws.com/download/GDC-PANCAN.basic_phenotype.tsv"
  clinical_file: "GDC-PANCAN.basic_phenotype.tsv"
  # Survival from toil hub
  survival_url: "https://toil-xena-hub.s3.us-east-1.amazonaws.com/download/TCGA_survival_data"
  survival_file: "TCGA_survival_data"
  # Survival also from GDC hub (backup)
  survival_gdc_url: "https://gdc-hub.s3.us-east-1.amazonaws.com/download/GDC-PANCAN.survival.tsv"
  survival_gdc_file: "GDC-PANCAN.survival.tsv"
  cancer_types:                             # ICB-relevant TCGA cohorts
    - SKCM   # melanoma
    - LUAD   # lung adenocarcinoma
    - LUSC   # lung squamous
    - KIRC   # clear cell RCC
    - BLCA   # bladder
    - HNSC   # head and neck
    - STAD   # gastric
    - UCEC   # endometrial
    - COAD   # colorectal
    - LIHC   # hepatocellular

